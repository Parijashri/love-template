<!DOCTYPE html>
<html>
<head>
<title>Create Love Page 💖</title>

<style>
body{
  background:#ffe4ec;
  text-align:center;
  font-family:sans-serif;
}
input,textarea{
  margin:10px;
  padding:10px;
  width:250px;
  border-radius:10px;
  border:none;
}
button{
  padding:12px 20px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Create Your Love Page 💖</h2>

<input id="name" placeholder="Their Name 💕"><br>

<textarea id="letter" placeholder="Write your letter 💌"></textarea><br>

<input type="file" id="pfp"><br>
<input type="file" id="video"><br>

<input type="file" id="photos" multiple><br>

<textarea id="reasons" placeholder="Reasons (comma separated)"></textarea><br>

<button onclick="createPage()">Generate Link 💖</button>

<p id="link"></p>

<script type="module" src="app.js"></script>

</body>
</html>
